<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Candlestick Sniper</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --good: #22c55e;
      --bad: #ef4444;
      --warn: #f59e0b;
      --border: #334155;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
    .wrap { max-width: 980px; margin: 0 auto; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 18px; margin-bottom: 18px; }
    h1, h2, h3, p { margin-top: 0; }
    .muted { color: var(--muted); }
    .tabs { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .tab-btn { background: #0b1220; color: var(--text); border: 1px solid var(--border); padding: 12px 16px; border-radius: 12px; cursor: pointer; font-weight: bold; }
    .tab-btn.active { background: var(--accent); color: #00111a; border-color: var(--accent); }
    .mode-box { display: none; }
    .mode-box.active { display: block; }
    label { display: block; margin: 12px 0 6px; font-weight: bold; }
    input[type="file"], textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: #0b1220; color: var(--text); }
    textarea { min-height: 90px; resize: vertical; }
    button.action { background: var(--accent); color: #00111a; border: none; padding: 12px 16px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 14px; }
    button.good { background: var(--good); color: #052e16; border: none; padding: 10px 14px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-right: 8px; margin-top: 8px; }
    button.bad { background: var(--bad); color: white; border: none; padding: 10px 14px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 8px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 800px) { .row { grid-template-columns: 1fr; } }
    .result-buy { color: var(--good); font-weight: bold; }
    .result-sell { color: var(--bad); font-weight: bold; }
    .result-wait { color: var(--warn); font-weight: bold; }
    .pill { display: inline-block; padding: 6px 10px; border-radius: 999px; background: #0b1220; border: 1px solid var(--border); color: var(--text); font-size: 12px; margin-right: 6px; margin-bottom: 6px; }
    .report-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-top: 14px; }
    .report-item, .stat, .trade-item { background: #0b1220; border: 1px solid var(--border); border-radius: 12px; padding: 12px; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; }
    .trade-item { margin-top: 10px; }
    pre { white-space: pre-wrap; word-break: break-word; background: #0b1220; border: 1px solid var(--border); border-radius: 10px; padding: 12px; overflow-x: auto; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>AI Candlestick Sniper</h1>
      <p class="muted">Personal-use scanner using candlestick analysis + chart pattern confirmation.</p>
      <div>
        <span class="pill">HTF + LTF</span>
        <span class="pill">Quick Scan</span>
        <span class="pill">Sniper Candlestick Mode</span>
      </div>
    </div>

    <div class="card">
      <h2>1. Choose mode</h2>
      <div class="tabs">
        <button class="tab-btn active" id="quickTab" onclick="setMode('quick')">Quick Scan</button>
        <button class="tab-btn" id="sniperTab" onclick="setMode('sniper')">Sniper Candlestick Mode</button>
      </div>

      <div class="row">
        <div>
          <label for="htfImage">Higher timeframe chart (1H or 4H)</label>
          <input type="file" id="htfImage" accept="image/*" />
        </div>
        <div>
          <label for="ltfImage">Entry timeframe chart (15m)</label>
          <input type="file" id="ltfImage" accept="image/*" />
        </div>
      </div>

      <div id="quickMode" class="mode-box active">
        <label for="quickNotes">Quick instruction (optional)</label>
        <textarea id="quickNotes" placeholder="Scan this setup and tell me if it is a clean buy, sell, or wait."></textarea>
      </div>

      <div id="sniperMode" class="mode-box">
        <label for="sniperNotes">Sniper instruction (optional)</label>
        <textarea id="sniperNotes" placeholder="Only return a signal if the candlestick setup is strong, confirmed, and not mixed."></textarea>
      </div>

      <button class="action" onclick="analyze()">Analyze Trade</button>
    </div>

    <div class="card">
      <h2>2. Result</h2>
      <div id="resultArea">
        <p class="muted">No analysis yet.</p>
      </div>
    </div>

    <div class="card">
      <h2>3. Performance</h2>
      <div class="stats" id="stats"></div>
    </div>

    <div class="card">
      <h2>4. Trade History</h2>
      <div id="history"></div>
    </div>
  </div>

  <script>
    const GEMINI_API_KEY = "AIzaSyAKrl30kPDorc_98UGGSv7YsSPNvmJn9fA";
    const GEMINI_URL =
      "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" +
      encodeURIComponent(GEMINI_API_KEY);

    let currentMode = "quick";

    function setMode(mode) {
      currentMode = mode;
      document.getElementById("quickTab").classList.toggle("active", mode === "quick");
      document.getElementById("sniperTab").classList.toggle("active", mode === "sniper");
      document.getElementById("quickMode").classList.toggle("active", mode === "quick");
      document.getElementById("sniperMode").classList.toggle("active", mode === "sniper");
    }

 function toBase64(file) {
  return new Promise((resolve, reject) => {
    if (!file) {
      reject(new Error("No file selected."));
      return;
    }

    if (!file.type || !file.type.startsWith("image/")) {
      reject(new Error("Selected file is not an image."));
      return;
    }

    const reader = new FileReader();

    reader.onload = () => {
      try {
        const result = reader.result;
        if (typeof result !== "string" || !result.includes(",")) {
          reject(new Error("Could not read image data."));
          return;
        }
        resolve(result.split(",")[1]);
      } catch (error) {
        reject(new Error("Failed to process image file."));
      }
    };

    reader.onerror = () => {
      reject(new Error("Failed to read the selected image file."));
    };

    reader.onabort = () => {
      reject(new Error("Image reading was cancelled."));
    };

    reader.readAsDataURL(file);
  });
}

    function getTrades() {
      return JSON.parse(localStorage.getItem("trades") || "[]");
    }

    function setTrades(trades) {
      localStorage.setItem("trades", JSON.stringify(trades));
    }

    function saveTrade(analysis) {
      const trades = getTrades();
      trades.push({
        signal: analysis.signal,
        confidence: analysis.confidence,
        reason: analysis.reason,
        trend: analysis.trend,
        candlestick_pattern: analysis.candlestick_pattern,
        pattern_strength: analysis.pattern_strength,
        market_sentiment: analysis.market_sentiment,
        risk_level: analysis.risk_level,
        entry_quality: analysis.entry_quality,
        confirmation: analysis.confirmation,
        chart_pattern: analysis.chart_pattern,
        stop_loss: analysis.stop_loss,
        take_profit: analysis.take_profit,
        result: null,
        date: new Date().toLocaleString()
      });
      setTrades(trades);
      renderHistory();
      renderStats();
      alert("Trade saved.");
    }

    function updateTradeResult(index, result) {
      const trades = getTrades();
      trades[index].result = result;
      setTrades(trades);
      renderHistory();
      renderStats();
    }

    function renderStats() {
      const trades = getTrades();
      const total = trades.length;
      const wins = trades.filter(t => t.result === "WIN").length;
      const losses = trades.filter(t => t.result === "LOSS").length;
      const decided = wins + losses;
      const waits = trades.filter(t => t.signal === "WAIT").length;
      const winRate = decided ? ((wins / decided) * 100).toFixed(1) : "0.0";

      document.getElementById("stats").innerHTML = `
        <div class="stat"><strong>Total saved</strong><br>${total}</div>
        <div class="stat"><strong>Wins</strong><br>${wins}</div>
        <div class="stat"><strong>Losses</strong><br>${losses}</div>
        <div class="stat"><strong>Win rate</strong><br>${winRate}%</div>
        <div class="stat"><strong>WAIT setups</strong><br>${waits}</div>
      `;
    }

    function renderHistory() {
      const trades = getTrades();
      const history = document.getElementById("history");

      if (!trades.length) {
        history.innerHTML = `<p class="muted">No saved trades yet.</p>`;
        return;
      }

      history.innerHTML = trades.map((t, i) => `
        <div class="trade-item">
          <strong>${t.signal}</strong> | Confidence: ${t.confidence}% | ${t.entry_quality || "N/A"}
          <br><span class="muted">${t.date}</span>
          <br><span>${t.reason || ""}</span>
          <br><span>Pattern: ${t.candlestick_pattern || "NONE"} | Chart Pattern: ${t.chart_pattern || "NONE"}</span>
          <br><span>SL: ${t.stop_loss || "N/A"} | TP: ${t.take_profit || "N/A"}</span>
          <br><span>Result: ${t.result || "Not marked yet"}</span>
          <br>
          <button class="good" onclick="updateTradeResult(${i}, 'WIN')">WIN</button>
          <button class="bad" onclick="updateTradeResult(${i}, 'LOSS')">LOSS</button>
        </div>
      `).join("");
    }

    function extractJson(text) {
      if (!text) throw new Error("Empty model response.");

      let cleaned = text.trim();

      if (cleaned.startsWith("```")) {
        cleaned = cleaned.replace(/^```(?:json)?/i, "").replace(/```$/i, "").trim();
      }

      const firstBrace = cleaned.indexOf("{");
      const lastBrace = cleaned.lastIndexOf("}");

      if (firstBrace === -1 || lastBrace === -1) {
        throw new Error("Could not find JSON in model response.");
      }

      return JSON.parse(cleaned.slice(firstBrace, lastBrace + 1));
    }

    async function analyze() {
      const htfFile = document.getElementById("htfImage").files[0];
      const ltfFile = document.getElementById("ltfImage").files[0];

      if (!htfFile || !ltfFile) {
        alert("Upload both charts.");
        return;
      }

      const note =
        currentMode === "quick"
          ? document.getElementById("quickNotes").value.trim()
          : document.getElementById("sniperNotes").value.trim();

      const resultArea = document.getElementById("resultArea");
      resultArea.innerHTML = `<p class="muted">Analyzing...</p>`;

      try {
        const [htfBase64, ltfBase64] = await Promise.all([
          toBase64(htfFile),
          toBase64(ltfFile)
        ]);

        const quickPrompt = `
You are an expert candlestick trading analyst trained using the Candlestick Trading Bible.

The user uploaded:
- Image 1 = higher timeframe chart
- Image 2 = lower timeframe chart

Your job:
Analyze both charts using candlestick patterns as the main basis for direction.

Use:
- trend direction
- reversal patterns
- continuation context
- candlestick confluence
- chart pattern confirmation from the cheat sheet

Candlestick patterns to detect:

Bullish:
- bullish engulfing
- morning star
- hammer
- bullish pin bar
- dragonfly doji
- bullish inside bar breakout

Bearish:
- bearish engulfing
- evening star
- shooting star
- bearish pin bar
- gravestone doji
- bearish inside bar breakout

Neutral / caution:
- doji
- spinning top

Secondary chart-pattern confirmation:
- Bullish Double Bottom
- Bearish Double Top
- Bullish Inverted Head and Shoulder
- Bearish Head Shoulders
- Bullish Falling Wedge
- Bearish Rising Wedge
- Bullish Triple Bottom
- Bearish Triple Top
- Bullish Flag Pattern
- Bearish Flag Pattern
- Bullish Pennant Pattern
- Bearish Pennant Pattern
- Descending Triangle

Instruction from user:
${note || "NONE"}

Rules:
- Strong bullish confluence → BUY
- Strong bearish confluence → SELL
- Mixed or weak signals → WAIT
- Do NOT guess
- Be strict and realistic

Return ONLY valid JSON:

{
  "signal": "BUY or SELL or WAIT",
  "confidence": 0,
  "reason": "",
  "trend": "UPTREND or DOWNTREND or SIDEWAYS or UNCLEAR",
  "candlestick_pattern": "NONE or BULLISH_ENGULFING or BEARISH_ENGULFING or DOJI or DRAGONFLY_DOJI or GRAVESTONE_DOJI or MORNING_STAR or EVENING_STAR or HAMMER or SHOOTING_STAR or BULLISH_PIN_BAR or BEARISH_PIN_BAR or BULLISH_INSIDE_BAR_BREAKOUT or BEARISH_INSIDE_BAR_BREAKOUT",
  "pattern_strength": "STRONG or MEDIUM or WEAK",
  "market_sentiment": "BULLISH or BEARISH or NEUTRAL",
  "risk_level": "LOW or MEDIUM or HIGH",
  "entry_quality": "SNIPER or NORMAL or WEAK",
  "confirmation": "CONFIRMED or PARTIAL or NONE",
  "chart_pattern": "NONE or Bullish Double Bottom or Bearish Double Top or Bullish Inverted Head and Shoulder or Bearish Head Shoulders or Bullish Falling Wedge or Bearish Rising Wedge or Bullish Triple Bottom or Bearish Triple Top or Bullish Flag Pattern or Bearish Flag Pattern or Bullish Pennant Pattern or Bearish Pennant Pattern or Descending Triangle",
  "stop_loss": "",
  "take_profit": ""
}
        `.trim();

        const sniperPrompt = `
You are an elite candlestick trading analyst trained on the Candlestick Trading Bible.

The user uploaded:
- Image 1 = higher timeframe chart
- Image 2 = lower timeframe chart

Your job:
Analyze both charts using candlestick principles and return only high-quality sniper setups.

You must evaluate:
- trend context
- candlestick reversal / continuation patterns
- chart pattern confirmation
- whether the setup is sniper quality

Bullish sniper patterns:
- bullish engulfing
- morning star
- hammer
- bullish pin bar
- dragonfly doji
- bullish inside bar breakout

Bearish sniper patterns:
- bearish engulfing
- evening star
- shooting star
- bearish pin bar
- gravestone doji
- bearish inside bar breakout

Neutral / caution:
- doji
- spinning top
- weak indecision candles

Secondary chart-pattern confirmation:
- Bullish Double Bottom
- Bearish Double Top
- Bullish Inverted Head and Shoulder
- Bearish Head Shoulders
- Bullish Falling Wedge
- Bearish Rising Wedge
- Bullish Triple Bottom
- Bearish Triple Top
- Bullish Flag Pattern
- Bearish Flag Pattern
- Bullish Pennant Pattern
- Bearish Pennant Pattern
- Descending Triangle

Instruction from user:
${note || "NONE"}

Sniper rules:
- Return BUY only if bullish pattern is strong, clean, and supported by context
- Return SELL only if bearish pattern is strong, clean, and supported by context
- Return WAIT if:
  - pattern is weak
  - candles are mixed
  - market is sideways
  - no clear confirmation exists
  - setup quality is not sniper-level
- Prefer WAIT over guessing

Return ONLY valid JSON:

{
  "signal": "BUY or SELL or WAIT",
  "confidence": 0,
  "reason": "",
  "trend": "UPTREND or DOWNTREND or SIDEWAYS or UNCLEAR",
  "candlestick_pattern": "NONE or BULLISH_ENGULFING or BEARISH_ENGULFING or DOJI or DRAGONFLY_DOJI or GRAVESTONE_DOJI or MORNING_STAR or EVENING_STAR or HAMMER or SHOOTING_STAR or BULLISH_PIN_BAR or BEARISH_PIN_BAR or BULLISH_INSIDE_BAR_BREAKOUT or BEARISH_INSIDE_BAR_BREAKOUT",
  "pattern_strength": "STRONG or MEDIUM or WEAK",
  "market_sentiment": "BULLISH or BEARISH or NEUTRAL",
  "risk_level": "LOW or MEDIUM or HIGH",
  "entry_quality": "SNIPER or NORMAL or WEAK",
  "confirmation": "CONFIRMED or PARTIAL or NONE",
  "chart_pattern": "NONE or Bullish Double Bottom or Bearish Double Top or Bullish Inverted Head and Shoulder or Bearish Head Shoulders or Bullish Falling Wedge or Bearish Rising Wedge or Bullish Triple Bottom or Bearish Triple Top or Bullish Flag Pattern or Bearish Flag Pattern or Bullish Pennant Pattern or Bearish Pennant Pattern or Descending Triangle",
  "stop_loss": "",
  "take_profit": ""
}
        `.trim();

        const prompt = currentMode === "sniper" ? sniperPrompt : quickPrompt;

        const response = await fetch(GEMINI_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{
              parts: [
                { text: prompt },
                { inlineData: { mimeType: htfFile.type || "image/png", data: htfBase64 } },
                { inlineData: { mimeType: ltfFile.type || "image/png", data: ltfBase64 } }
              ]
            }],
            generationConfig: {
              temperature: 0.2,
              responseMimeType: "application/json"
            }
          })
        });

        const rawText = await response.text();
        let data;

        try {
          data = JSON.parse(rawText);
        } catch {
          throw new Error("Gemini returned invalid response: " + rawText);
        }

        if (!response.ok) {
          throw new Error(data?.error?.message || data?.message || "Analysis failed.");
        }

        const text =
          data?.candidates?.[0]?.content?.parts?.map(p => p.text || "").join("\\n") || "";

        const finalOutput = extractJson(text);

        const sniperFiltered =
          currentMode === "sniper" &&
          (
            !finalOutput ||
            typeof finalOutput.confidence !== "number" ||
            finalOutput.confidence < 80 ||
            finalOutput.entry_quality !== "SNIPER" ||
            finalOutput.pattern_strength !== "STRONG" ||
            finalOutput.confirmation !== "CONFIRMED" ||
            finalOutput.trend === "SIDEWAYS" ||
            !["BUY", "SELL", "WAIT"].includes(finalOutput.signal)
          );

        const displayOutput = sniperFiltered
          ? {
              signal: "WAIT",
              confidence: finalOutput?.confidence ?? 0,
              reason: "Filtered out: setup is not sniper quality.",
              trend: finalOutput?.trend || "UNCLEAR",
              candlestick_pattern: finalOutput?.candlestick_pattern || "NONE",
              pattern_strength: finalOutput?.pattern_strength || "WEAK",
              market_sentiment: finalOutput?.market_sentiment || "NEUTRAL",
              risk_level: finalOutput?.risk_level || "HIGH",
              entry_quality: finalOutput?.entry_quality || "WEAK",
              confirmation: finalOutput?.confirmation || "NONE",
              chart_pattern: finalOutput?.chart_pattern || "NONE",
              stop_loss: finalOutput?.stop_loss || "",
              take_profit: finalOutput?.take_profit || ""
            }
          : finalOutput;

        const signalClass =
          displayOutput.signal === "BUY" ? "result-buy" :
          displayOutput.signal === "SELL" ? "result-sell" :
          "result-wait";

        resultArea.innerHTML = `
          <h3 class="${signalClass}">${displayOutput.signal}</h3>
          <p><strong>Reason:</strong> ${displayOutput.reason || "No reason provided."}</p>

          <div class="report-grid">
            <div class="report-item"><strong>Confidence</strong><br>${displayOutput.confidence ?? 0}%</div>
            <div class="report-item"><strong>Trend</strong><br>${displayOutput.trend || "N/A"}</div>
            <div class="report-item"><strong>Pattern</strong><br>${displayOutput.candlestick_pattern || "NONE"}</div>
            <div class="report-item"><strong>Strength</strong><br>${displayOutput.pattern_strength || "WEAK"}</div>
            <div class="report-item"><strong>Confirmation</strong><br>${displayOutput.confirmation || "NONE"}</div>
            <div class="report-item"><strong>Sentiment</strong><br>${displayOutput.market_sentiment || "NEUTRAL"}</div>
            <div class="report-item"><strong>Chart Pattern</strong><br>${displayOutput.chart_pattern || "NONE"}</div>
            <div class="report-item"><strong>Risk</strong><br>${displayOutput.risk_level || "N/A"}</div>
            <div class="report-item"><strong>Entry Quality</strong><br>${displayOutput.entry_quality || "N/A"}</div>
            <div class="report-item"><strong>Stop Loss</strong><br>${displayOutput.stop_loss || "N/A"}</div>
            <div class="report-item"><strong>Take Profit</strong><br>${displayOutput.take_profit || "N/A"}</div>
          </div>

          <button class="action" id="saveTradeBtn">Save Trade</button>

          <h4 style="margin-top:16px;">Raw JSON</h4>
          <pre>${JSON.stringify(displayOutput, null, 2)}</pre>
        `;

        document.getElementById("saveTradeBtn").addEventListener("click", () => {
          saveTrade(displayOutput);
        });

     } catch (err) {
  console.error("Analyze error:", err);

  let message = "Unknown error";

  if (err instanceof Error && err.message) {
    message = err.message;
  } else if (typeof err === "string") {
    message = err;
  } else if (err && typeof err === "object") {
    message = JSON.stringify(err);
  }

  resultArea.innerHTML = `
    <p class="result-wait">Error</p>
    <p>${message}</p>
  `;
}
    }

    renderStats();
    renderHistory();
  </script>
</body>
</html>
